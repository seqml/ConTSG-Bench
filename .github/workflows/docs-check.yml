name: Docs Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-check.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/docs-check.yml"

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --offline
            --exclude-mail
            "./README.md"
            "./docs/**/*.md"
